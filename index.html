<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Ultra Premium AR — Native Quick Look & Scene Viewer</title>

<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<style>
  :root{--neon:#00e5ff;--accent:#7b5cff;--glass:rgba(255,255,255,0.04);--glass-border:rgba(255,255,255,0.10);--text:#ffffff;--muted:rgba(255,255,255,0.72)}
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    min-height:100vh;display:flex;align-items:center;justify-content:center;
    background:radial-gradient(1200px 600px at 10% 10%, rgba(0,229,255,0.06), transparent 12%),
               radial-gradient(900px 500px at 90% 90%, rgba(123,92,255,0.06), transparent 12%),
               #030305;font-family:Inter,system-ui,Arial;color:var(--text);padding:28px;
  }
  .card{width:100%;max-width:720px;height:82vh;max-height:820px;border-radius:28px;
    background:linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01));
    border:1px solid var(--glass-border);box-shadow:0 30px 90px rgba(0,0,0,0.75),0 0 60px rgba(0,229,255,0.06);
    padding:22px;display:flex;flex-direction:column;gap:18px;overflow:hidden;backdrop-filter: blur(18px);
  }
  .header{display:flex;align-items:center;justify-content:space-between;gap:12px}
  .badge{display:inline-flex;align-items:center;gap:10px;padding:6px 12px;border-radius:999px;background:rgba(0,0,0,0.45);border:1px solid rgba(255,255,255,0.04);color:var(--muted);font-size:12px;letter-spacing:0.12em;text-transform:uppercase}
  .title{font-size:20px;font-weight:700;letter-spacing:0.08em}
  .subtitle{font-size:13px;color:var(--muted)}
  .viewer-area{flex:1;border-radius:18px;overflow:hidden;position:relative;
    background:radial-gradient(600px 200px at 20% 10%, rgba(0,229,255,0.04), transparent 20%),
               radial-gradient(500px 200px at 80% 90%, rgba(123,92,255,0.03), transparent 20%),
               linear-gradient(180deg, rgba(0,0,0,0.55), rgba(0,0,0,0.6));
    box-shadow: inset 0 -40px 80px rgba(0,0,0,0.6);
  }
  model-viewer{width:100%;height:100%;display:block;background:transparent}
  .overlay-bottom{position:absolute;left:18px;right:18px;bottom:18px;z-index:8;display:flex;justify-content:space-between;align-items:center;gap:12px}
  .meta{display:flex;flex-direction:column;gap:4px;color:var(--muted)}
  .meta .label{font-size:11px;text-transform:uppercase;letter-spacing:0.12em}
  .meta .value{font-size:13px;color:var(--text)}
  .controls{display:flex;gap:10px;align-items:center}
  .btn{display:inline-flex;align-items:center;gap:10px;padding:12px 18px;border-radius:999px;border:1px solid rgba(255,255,255,0.06);background:linear-gradient(180deg,#ffffff 0%, #e6faff 100%);color:#000;font-weight:700;font-size:13px;cursor:pointer;box-shadow:0 12px 36px rgba(0,0,0,0.6),0 0 30px rgba(0,229,255,0.08);transition:transform .18s ease}
  .btn.ios{background:linear-gradient(180deg,#0b0b0b,#1a1a1a);color:var(--text);border:1px solid rgba(255,255,255,0.04);box-shadow:0 10px 30px rgba(0,0,0,0.7),0 0 18px rgba(123,92,255,0.06)}
  .loader{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:9;background:linear-gradient(180deg, rgba(0,0,0,0.45), rgba(0,0,0,0.6));transition:opacity .35s ease,visibility .35s ease}
  .loader.hidden{opacity:0;visibility:hidden;pointer-events:none}
  .ring{width:64px;height:64px;border-radius:50%;border:4px solid rgba(255,255,255,0.06);border-top-color:var(--neon);animation:spin 1s linear infinite;box-shadow:0 0 30px rgba(0,229,255,0.14)}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="card">
  <div class="header">
    <div>
      <div class="badge"><span style="width:8px;height:8px;border-radius:50%;background:var(--neon);display:inline-block;box-shadow:0 0 10px var(--neon)"></span> Native AR</div>
      <div class="title">Ultra Premium AR Experience</div>
      <div class="subtitle">Preview + native Quick Look (iOS) and Scene Viewer (Android)</div>
    </div>
    <div style="text-align:right;font-size:12px;color:var(--muted)">
      Files: <span style="color:var(--text)">mops.glb</span> · <span style="color:var(--text)">mops.usdz</span>
    </div>
  </div>

  <div class="viewer-area">
    <model-viewer id="preview"
      src="mops.glb"
      alt="3D preview"
      camera-controls
      auto-rotate
      rotation-per-second="30deg"
      exposure="1.05"
      shadow-intensity="1.4"
      environment-image="neutral"
      loading="eager">
    </model-viewer>

    <div class="overlay-bottom">
      <div class="meta">
        <div class="label">AR Ready</div>
        <div class="value">Quick Look · Scene Viewer</div>
      </div>

      <div class="controls">
        <a id="iosAnchor" rel="ar" href="mops.usdz" style="display:none"></a>

        <button id="btnIOS" class="btn ios">iPhone AR</button>
        <button id="btnAndroid" class="btn">Android AR</button>
      </div>
    </div>

    <div class="loader" id="loader">
      <div class="ring"></div>
    </div>
  </div>
</div>

<script>
(function(){
  const preview = document.getElementById('preview');
  const loader = document.getElementById('loader');
  const iosAnchor = document.getElementById('iosAnchor');
  const btnIOS = document.getElementById('btnIOS');
  const btnAndroid = document.getElementById('btnAndroid');

  const glbUrl = new URL('mops.glb', window.location.href).href;
  const usdzUrl = new URL('mops.usdz', window.location.href).href;
  iosAnchor.href = usdzUrl;

  preview.addEventListener('load', () => loader.classList.add('hidden'));

  const ua = navigator.userAgent;
  const isIOS = /iPhone|iPad|iPod/i.test(ua);
  const isAndroid = /Android/i.test(ua);

  if (isIOS) { btnIOS.style.opacity = '1'; btnAndroid.style.opacity = '0.6'; }
  else if (isAndroid) { btnAndroid.style.opacity = '1'; btnIOS.style.opacity = '0.6'; }

  btnIOS.addEventListener('click', () => {
    try { iosAnchor.click(); }
    catch { window.location.href = usdzUrl; }
  });

  btnAndroid.addEventListener('click', () => {
    const sceneViewerUrl =
      'https://arvr.google.com/scene-viewer/1.0?file=' +
      encodeURIComponent(glbUrl) +
      '&mode=ar_only&title=AR%20Model';

    const intentUrl =
      'intent://arvr.google.com/scene-viewer/1.0?file=' +
      encodeURIComponent(glbUrl) +
      '&mode=ar_only&title=AR%20Model#Intent;scheme=https;package=com.google.android.googlequicksearchbox;action=android.intent.action.VIEW;S.browser_fallback_url=' +
      encodeURIComponent(sceneViewerUrl) +
      ';end;';

    if (isAndroid) window.location.href = intentUrl;
    else window.open(sceneViewerUrl, '_blank');
  });
})();
</script>

</body>
</html>
